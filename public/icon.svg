<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-label="Delivery OS" role="img">
  <!-- Hi-vis cargo-yellow tile -->
  <rect width="32" height="32" rx="3" fill="#F2D900"/>

  <!-- Optimized route: depot (filled dot) → one elbow → arrowhead destination -->
  <circle cx="8" cy="24" r="2.6" fill="#0F0E0A"/>
